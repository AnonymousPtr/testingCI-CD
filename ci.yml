name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t gps-service .

    - name: Run Container
      run: docker run -d -p 3000:3000 gps-service
